<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Coral rounded square base -->
  <rect width="32" height="32" rx="7" fill="#CC785C"/>
  <!-- Stylized "S" / scrim layer mark — two offset translucent panels suggesting a test layer over reality -->
  <rect x="6" y="6" width="14" height="20" rx="2" fill="#FBF8F2" fill-opacity="0.95"/>
  <rect x="12" y="9" width="14" height="20" rx="2" fill="#1F1B16" fill-opacity="0.85"/>
  <text x="16" y="22" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-weight="700" font-size="13" fill="#FBF8F2">S</text>
</svg>
